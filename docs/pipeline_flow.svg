<text font-size="12" x="340" y="374" text-anchor="middle" fill="#085041">identify TID window · confirm carrier · check for E-region contamination</text>

<line x1="340" y1="390" x2="340" y2="412" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>


<text font-size="12" x="340" y="305" text-anchor="middle" fill="#0C447C">verify metadata · identify 10 MHz subchannel</text>

<line x1="340" y1="310" x2="340" y2="332" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>


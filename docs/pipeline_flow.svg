<text font-size="12" x="340" y="454" text-anchor="middle" fill="#0C447C">extract both methods · 60s or 10s cadence · multi-subchannel aware</text>

<line x1="340" y1="470" x2="340" y2="492" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>


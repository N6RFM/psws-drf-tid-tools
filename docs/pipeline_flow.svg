<text font-size="12" x="340" y="237" text-anchor="middle" fill="#633806">10 sps complex baseband · one folder per station</text>

<line x1="340" y1="242" x2="340" y2="264" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>

